---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-logs-collector
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.3.7
    digest: sha256:2ec5d41cbc0309ef0cfa10945e5b7773298ba25b8a67a28296f888b8adb2b0ba
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-logs-collector
---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs-collector
spec:
  dependsOn:
    - name: victoria-logs
      namespace: observability
  chartRef:
    kind: OCIRepository
    name: victoria-logs-collector
  interval: 1h
  values:
    fullnameOverride: victoria-logs-collector
    global:
      image:
        registry: quay.io
    podMonitor:
      enabled: true
    remoteWrite:
      - url: http://victoria-logs-server.observability.svc.cluster.local:9428
        maxDiskUsagePerURL: 10GB
    collector:
      streamFields:
        - kubernetes.pod_name # Included by default
        - kubernetes.pod_namespace # Included by default
        - kubernetes.container_name # Included by default
        - kubernetes.pod_labels.app.kubernetes.io/name # Helps to filter on workload level across pods
      excludeFilter: "kubernetes.pod_name:~'foundryvtt-.*'"
    extraArgs:
      "kubernetesCollector.decolorizeFields": _msg # Continuwuity logs ANSI color codes by default, other apps might too
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 20m
        memory: 48Mi
