---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/dragonflydb.io/dragonfly_v1alpha1.json
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: dragonfly-auth
spec:
  image: ghcr.io/dragonflydb/dragonfly:v1.39.0
  replicas: 3
  networkPolicyEnabled: true # Allows own namespace on 6379 (redis port) and operator namespace and controlplane namespaces on 9999 (mgmt and metrics port)
  authentication:
    passwordFromSecret:
      name: dragonfly-auth-secret
      key: AUTHELIA_SESSION_REDIS_PASSWORD
  env:
    - name: MAX_MEMORY
      valueFrom:
        resourceFieldRef:
          resource: limits.memory
          divisor: 1Mi
  args:
    - --maxmemory=$(MAX_MEMORY)Mi
    - --proactor_threads=2
    - --cluster_mode=emulated
    - --lock_on_hashtags # https://github.com/dragonflydb/dragonfly/issues/782
    - --default_lua_flags=allow-undeclared-keys
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: "kubernetes.io/hostname"
      whenUnsatisfiable: "DoNotSchedule"
      labelSelector:
        matchLabels:
          app.kubernetes.io/part-of: dragonfly
