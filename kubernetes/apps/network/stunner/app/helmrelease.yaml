---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: stunner
spec:
  chartRef:
    kind: OCIRepository
    name: stunner
  interval: 1h
  values:
    standardCrds: # meaning Gateway API CRDs: these are already installed by envoy-gateway on my setup
      enabled: false
    stunnerGatewayOperator:
      dataplane:
        spec:
          enableMetricsEndpoint: true
