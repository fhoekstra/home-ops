---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: stunner
spec:
  dnsNames:
    - turn.${CLUSTER_DOMAIN}
  duration: 160h
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-production
  privateKey:
    algorithm: ECDSA
    rotationPolicy: Always
    size: 256
  secretName: stunner-tls
  usages:
    - digital signature
    - key encipherment
    - server auth
