---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: towonel-agent
spec:
  endpoints:
    - dnsName: external.${CLUSTER_DOMAIN}
      recordType: CNAME
      targets:
        - &erwan_towonel_server edge-eu.towonel.dev
    - dnsName: twnl.${CLUSTER_DOMAIN}
      recordType: CNAME
      targets:
        - *erwan_towonel_server
    - dnsName: tunnel.${CLUSTER_DOMAIN}
      recordType: CNAME
      targets:
        - *erwan_towonel_server
    - dnsName: ${CLUSTER_DOMAIN}.
      recordType: A
      targets:
        - "54.36.18.175"
