---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/externaldns.k8s.io/dnsendpoint_v1alpha1.json
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: towonel-agent
spec:
  endpoints:
    - dnsName: external.${CLUSTER_DOMAIN}
      recordType: CNAME
      recordTTL: 300
      targets:
        - edge-eu.towonel.dev
    - dnsName: ${CLUSTER_DOMAIN}
      recordType: A
      recordTTL: 300
      targets:
        - "54.36.18.175"
