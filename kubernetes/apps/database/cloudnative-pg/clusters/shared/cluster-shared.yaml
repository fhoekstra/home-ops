# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/postgresql.cnpg.io/cluster_v1.json
apiVersion: postgresql.cnpg.io/v1
metadata:
  name: cluster-shared
  annotations:
    # required for seamless bootstrap: https://github.com/cloudnative-pg/cloudnative-pg/issues/5778#issuecomment-2783417464
    # cnpg.io/skipEmptyWalArchiveCheck: "enabled"
    #
    # Also set stakaer reloader annotations to point at s3-creds, authelia-secret and lldap-secret
    # secret.reloader.stakater.com/reload: "s3-creds,authelia-secret,lldap-secret"
kind: Cluster
spec:
  instances: 2
  imageCatalogRef:
    apiGroup: postgresql.cnpg.io
    kind: ClusterImageCatalog
    major: 18
    name: postgresql-minimal-trixie
  enableSuperuserAccess: true
  superuserSecret:
    name: pg-secret
  storage:
    size: 5Gi
    storageClass: local-hostpath
  resources:
    limits:
      memory: 256Mi
    requests:
      cpu: 250m
  postgresql:
    parameters:
      dynamic_shared_memory_type: sysv
      shared_buffers: 128MB
  bootstrap:
    initdb: {}
  plugins: []
    # - name: barman-cloud.cloudnative-pg.io
    #   isWALArchiver: true
    #   parameters:
    #     barmanObjectName: cluster-shared-backup-local
    #     serverName: &currentServer cluster-shared-v1

  # Note: externalClusters is needed when recovering from an existing cnpg cluster
  externalClusters:
    - name: &recoveryServer cluster-17-v6
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: cluster-17-backup-local
          serverName: *recoveryServer
---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: cluster-shared-backup-local
spec:
  retentionPolicy: 15d
  instanceSidecarConfiguration:
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
  configuration:
    destinationPath: s3://cnpg/cluster-shared/
    endpointURL: http://versity.storage.svc.cluster.local:7070
    s3Credentials:
      accessKeyId:
        name: s3-creds
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: s3-creds
        key: SECRET_KEY
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: cluster-shared
spec:
  backupOwnerReference: self
  cluster:
    name: cluster-shared
  schedule: "0 37 2 ? * *"
  immediate: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/monitoring.coreos.com/podmonitor_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cluster-shared
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: cluster-shared
  podMetricsEndpoints:
    - port: metrics
