port: 7880
bind_addresses:
  - ""
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  ips:
    includes:
      - "10.69.0.0/16"
  turn_servers:
    - host: turn.${CLUSTER_DOMAIN}
      port: 15349
      protocol: tls
      secret: "${STUNNER_SHARED_SECRET}"
    - host: turn.${CLUSTER_DOMAIN}
      port: 13478
      protocol: udp
      secret: "${STUNNER_SHARED_SECRET}"
  use_external_ip: false
  enable_loopback_candidate: false
room:
  auto_create: false
turn:
  enabled: false
log_level: info
keys:
  "${LIVEKIT_API_KEY}": "${LIVEKIT_API_SECRET}"
