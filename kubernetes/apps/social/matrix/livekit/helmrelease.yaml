---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app livekit
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          *app :
            image:
              # renovate: datasource=docker depName=livekit/livekit-server
              repository: mirror.gcr.io/livekit/livekit-server
              tag: v1.13.2
            args:
              - --config
              - /etc/livekit.yaml
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 7880
                  initialDelaySeconds: 10
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 7880
                  initialDelaySeconds: 5
                  periodSeconds: 10
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    persistence:
      config:
        type: secret
        name: livekit-config
        globalMounts:
          - path: /etc/livekit.yaml
            subPath: livekit.yaml
            readOnly: true

    service:
      *app :
        controller: *app
        forceRename: livekit
        ports:
          http:
            port: 7880
            primary: true
          rtc-tcp:
            port: 7881
            protocol: TCP
