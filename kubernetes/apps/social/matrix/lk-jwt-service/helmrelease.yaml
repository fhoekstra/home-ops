---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app lk-jwt-service
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

    controllers:
      *app :
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          *app :
            image:
              # renovate: datasource=docker depName=ghcr.io/element-hq/lk-jwt-service
              repository: ghcr.io/element-hq/lk-jwt-service
              tag: 0.5.0
            env:
              LIVEKIT_JWT_BIND: ":8081"
              LIVEKIT_URL: ws://livekit.social.svc.cluster.local:7881
              # LIVEKIT_URL: wss://livekit.${CLUSTER_DOMAIN}
              LIVEKIT_FULL_ACCESS_HOMESERVERS: ${CLUSTER_DOMAIN}
            envFrom:
              - secretRef:
                  name: lk-jwt-service
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 30
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 8081
                  initialDelaySeconds: 3
                  periodSeconds: 10
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                memory: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL

    service:
      *app :
        controller: *app
        ports:
          http:
            port: 8081
