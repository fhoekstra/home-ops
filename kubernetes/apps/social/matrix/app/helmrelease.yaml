---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app matrix-continuwuity
spec:
  interval: 30m
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  maxHistory: 2
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    defaultPodOptions:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
    controllers:
      *app :
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: forgejo.ellis.link/continuwuation/continuwuity
              tag: v0.5.9
            env:
              CONTINUWUITY_LOG: "info"
              CONTINUWUITY_SERVER_NAME: &acc_domain "kubes.cloud"
              CONTINUWUITY_ADDRESS: "::"
              CONTINUWUITY_PORT: "8080"
              CONTINUWUITY_DATABASE_PATH: "/data/db"
              CONTINUWUITY_DATABASE_BACKUP_PATH: "/backups"
              CONTINUWUITY_DATABASE_BACKUPS_TO_KEEP: "5"
              CONTINUWUITY_ROCKSDB_COMPRESSION_ALGO: "zstd"
              CONTINUWUITY_ROCKSDB_COMPRESSION_LEVEL: "32767"
              CONTINUWUITY_ROCKSDB_BOTTOMMOST_COMPRESSION_LEVEL: "32767"
              CONTINUWUITY_ROCKSDB_BOTTOMMOST_COMPRESSION: "true"
              CONTINUWUITY_WELL_KNOWN__CLIENT: "https://m.kubes.cloud"
              CONTINUWUITY_WELL_KNOWN__SERVER: "m.kubes.cloud:443"
              COnTINUWUITY_ALLOW_ENCRYPTION: "true"
              CONTINUWUITY_ALLOW_FEDERATION: "true"
              CONTINUWUITY_ALLOW_REGISTRATION: "true"
              CONTINUWUITY_SUSPEND_ON_REGISTER: "true"
              CONTINUWUITY_FORGET_FORCED_UPON_LEAVE: "true"
              CONTINUWUITY_REQUIRE_AUTH_FOR_PROFILE_REQUESTS: "true"
              CONTINUWUITY_ALLOW_PUBLIC_ROOM_DIRECTORY_WITHOUT_AUTH: "false"
              CONTINUWUITY_ALLOW_PUBLIC_ROOM_DIRECTORY_OVER_FEDERATION: "false"
              CONTINUWUITY_LOCKDOWN_PUBLIC_ROOM_DIRECTORY: "true"
              CONTINUWUITY_ALLOW_LEGACY_MEDIA: "false"
              CONTINUWUITY_MAX_REQUEST_SIZE: "20971520"
              CONTINUWUITY_QUERY_OVER_TCP_ONLY: "true" # Query DNS over TCP only: recommended in containers
              CONTINUWUITY_IP_LOOKUP_STRATEGY: "1" # Remove when IPv6 networking is added to my cluster
              CONTINUWUITY_NEW_USER_DISPLAYNAME_SUFFIX: ""
              # CONTINUWUITY_FORBIDDEN_REMOTE_SERVER_NAMES: |
              #   ["matrix.org"]
              # CONTINUWUITY_FORBIDDEN_REMOTE_ROOM_DIRECTORY_SERVER_NAMES: |
              #   ["matrix.org"]
              # CONTINUWUITY_URL_PREVIEW_DOMAIN_EXPLICIT_DENYLIST: |
              #   ["matrix.org"]
              CONTINUWUITY_QUERY_TRUSTED_KEY_SERVERS_FIRST: false # NOTE: this is because continuwuity only supports Synapse as trusted key servers
              CONTINUWUITY_QUERY_TRUSTED_KEY_SERVERS_FIRST_ON_JOIN: false
            envFrom:
              - secretRef:
                  name: continuwuity
            resources:
              limits:
                memory: 2Gi
              requests:
                cpu: 500m
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - "ALL"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            #   liveness: &probes
            #     enabled: false
            #     custom: true
            #     spec:
            #       httpGet:
            #         path: /_matrix/federation/v1/version
            #         port: http
            #       initialDelaySeconds: 0
            #       periodSeconds: 10
            #       timeoutSeconds: 1
            #       failureThreshold: 3
            #   readiness: *probes

    service:
      *app :
        controller: *app
        ports:
          http:
            port: &port 8080

    route:
      *app :
        hostnames:
          - m.kubes.cloud
        parentRefs: &gateways
          - name: envoy-external-kubes
            namespace: networking
      matrix-webfinger:
        annotations: # DNS for kubes.cloud. root is managed separately through an A record
          external-dns.alpha.kubernetes.io/controller: "ignore"
        hostnames:
          - kubes.cloud
        parentRefs: *gateways
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /.well-known/matrix
            backendRefs:
              - name: *app
                port: *port

    persistence:
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
            subPath: data
          - path: /backups
            subPath: backups
