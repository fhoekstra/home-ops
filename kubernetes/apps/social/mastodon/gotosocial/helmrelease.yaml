---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app gotosocial
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 30m
  values:
    controllers:
      *app :
        type: deployment
        pod:
          securityContext:
            fsGroup: 1000
        containers:
          *app :
            image:
              repository: docker.io/superseriousbusiness/gotosocial
              tag: "0.21.2"
            env:
              TZ: Europe/Amsterdam
              GTS_HOST: &host gts.kubes.cloud
              GTS_ACCOUNT_DOMAIN: &account_domain kubes.cloud
              GTS_STORAGE_LOCAL_BASE_PATH: /storage
              GTS_SEMAPHORE_URL: https://phanpy.kubes.cloud
              GTS_LANDING_PAGE_USER: "freek"
              GTS_METRICS_ENABLED: "true"
              GTS_TRUSTED_PROXIES: "127.0.0.1/32,::1,10.96.0.0/16"
              GTS_ADVANCED_RATE_LIMIT_EXCEPTIONS: "192.168.1.0/24"
              OTEL_EXPORTER_PROMETHEUS_HOST: 0.0.0.0
              GTS_ACCOUNTS_ALLOW_CUSTOM_CSS: "true"
              OTEL_METRICS_PRODUCERS: prometheus
              OTEL_METRICS_EXPORTER: prometheus

              # Temporarily allow signups
              GTS_ALLOW_REGISTRATION_OPEN: "true"
              GTS_ACCOUNTS_REASON_REQUIRED: "false"

              GTS_OIDC_ENABLED: "false"
              # GTS_OIDC_IDP_NAME: "Kanidm"
              # GTS_OIDC_ISSUER: "https://idm.erwanleboucher.dev/oauth2/openid/gotosocial"
              # GTS_OIDC_SCOPES: "openid,email,profile,groups"
              # GTS_OIDC_LINK_EXISTING: "true"
              # GTS_OIDC_ADMIN_GROUPS: "admins@idm.erwanleboucher.dev"
              # GTS_OIDC_CLIENT_ID:
              #   valueFrom:
              #     secretKeyRef:
              #       name: kanidm-gotosocial-oidc
              #       key: client-id
              # GTS_OIDC_CLIENT_SECRET:
              #   valueFrom:
              #     secretKeyRef:
              #       name: kanidm-gotosocial-oidc
              #       key: client-secret

              GTS_DB_TYPE: postgres
              GTS_DB_POSTGRES_CONNECTION_STRING:
                valueFrom:
                  secretKeyRef: #
                    name: gts-pg-app
                    key: fqdn-uri
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    defaultPodOptions:
      automountServiceAccountToken: false
      # enableServiceLinks: false
      # hostIPC: false
      # hostNetwork: false
      # hostPID: false
      # shareProcessNamespace: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    persistence:
      storage:
        type: nfs
        server: ${NFS_SERVER_IP_ADDRESS}
        path: /mnt/data/nfs/backed-up/k8s/gts-storage
        globalMounts:
          - path: /storage
      tmpfs:
        type: emptyDir
        sizeLimit: 1Gi
        globalMounts:
          - path: /tmp
            subPath: tmp

    service:
      *app :
        controller: *app
        ports:
          http:
            port: &http 8080
          metrics:
            port: 9464

    route:
      *app :
        parentRefs:
          # Temporarily expose internally only until I have created an account
          - name: envoy-internal
            # - name: envoy-external-kubes
            namespace: network
        hostnames:
          - *host
        rules:
          - backendRefs:
              - name: *app
                port: *http
            filters:
              - cors:
                  allowHeaders:
                    - "Content-Type"
                    - "Authorization"
                    - "Cache-Control"
                  allowMethods:
                    - "POST"
                    - "GET"
                    - "OPTIONS"
                  allowOrigins:
                    - "https://phanpy.kubes.cloud"
                  maxAge: 86400
                type: CORS
      webfinger-gts:
        hostnames:
          - *account_domain
        parentRefs:
          # - name: envoy-external-kubes
          #   namespace: network
          - name: envoy-internal
            namespace: network
        rules:
          - matches:
              - path:
                  type: Exact
                  value: /.well-known/webfinger
              - path:
                  type: Exact
                  value: /.well-known/host-meta
              - path:
                  type: Exact
                  value: /.well-known/nodeinfo
            backendRefs:
              - identifier: *app
                port: *http
    serviceMonitor:
      *app :
        endpoints:
          - port: metrics
            interval: 30s
            path: /metrics
