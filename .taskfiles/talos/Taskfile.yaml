---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  generate-config:
    desc: Generate Talos configuration
    dir: "{{.TALHELPER_DIR}}"
    cmd: talhelper genconfig
    preconditions:
      - test -f {{.TALHELPER_DIR}}/talconfig.yaml
      - test -f {{.ROOT_DIR}}/.sops.yaml
      - test -f {{.SOPS_AGE_KEY_FILE}}
      - which talhelper

  apply-node:
    desc: Apply Talos config to a node [IP=required]
    dir: "{{.TALHELPER_DIR}}"
    cmd: talhelper gencommand apply --node {{.IP}} --extra-flags '--mode={{.MODE}}' | bash
    vars:
      MODE: '{{.MODE | default "auto"}}'
    requires:
      vars: [IP]
    preconditions:
      - talosctl --nodes {{.IP}} get machineconfig
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talhelper talosctl yq

  apply-node-from-maintenance:
    desc: Apply Talos config to a node from maintenance mode [IP=required]
    dir: "{{.TALHELPER_DIR}}"
    cmd: talhelper gencommand apply --node {{.IP}} --extra-flags '--mode=reboot' --extra-flags --insecure | bash
    requires:
      vars: [IP]
    preconditions:
      - talosctl get machinestatus --nodes {{.IP}} --insecure
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talhelper talosctl yq

  fetch-raw-disk-image-for-sbc:
    desc: Fetch the metal-arm64.raw disk image for the schematic that is set in the talconfig file from the Talos Image Factory API.
    cmds:
      - curl -L https://factory.talos.dev/image/{{ .SCHEMATIC_ID }}/{{ .TALOS_VERSION }}/metal-arm64.raw.xz --output metal-arm64.raw.xz
      - xz -d metal-arm64.raw.xz
    vars:
      SCHEMATIC_ID:
        sh: yq '.nodes[0].talosImageURL | split("/")[-1]' {{.TALHELPER_DIR}}/talconfig.yaml
      TALOS_VERSION:
        sh: yq '.talosVersion' {{.TALHELPER_DIR}}/talconfig.yaml
    preconditions:
      - test -f {{.TALHELPER_DIR}}/talconfig.yaml
      - which curl

  upgrade-node:
    desc: Upgrade Talos on a single node [IP=required]
    dir: "{{.TALHELPER_DIR}}"
    cmd: talhelper gencommand upgrade --node {{.IP}} --extra-flags "--image='{{.TALOS_IMAGE}}:{{.TALOS_VERSION}}' --timeout=10m" | bash
    vars:
      TALOS_IMAGE:
        sh: yq '.nodes[] | select(.ipAddress == "{{.IP}}") | .talosImageURL' {{.TALHELPER_DIR}}/talconfig.yaml
      TALOS_VERSION:
        sh: yq '.talosVersion' {{.TALHELPER_DIR}}/talconfig.yaml
    requires:
      vars: [IP]
    preconditions:
      - talosctl --nodes {{.IP}} get machineconfig
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which kubectl talhelper talosctl yq

  upgrade-k8s:
    desc: Upgrade Kubernetes
    dir: "{{.TALHELPER_DIR}}"
    cmd: talhelper gencommand upgrade-k8s --extra-flags "--to '{{.KUBERNETES_VERSION}}'" | bash
    vars:
      KUBERNETES_VERSION:
        sh: yq '.kubernetesVersion' {{.TALHELPER_DIR}}/talconfig.yaml
    preconditions:
      - talosctl config info
      - test -f {{.TALOSCONFIG}}
      - which talhelper talosctl yq

  reset:
    desc: Resets nodes back to maintenance mode
    dir: "{{.TALHELPER_DIR}}"
    prompt: This will destroy your cluster and reset the nodes back to maintenance mode... continue?
    cmd: talhelper gencommand reset --extra-flags="--reboot {{- if eq .CLI_FORCE false }} --system-labels-to-wipe STATE --system-labels-to-wipe EPHEMERAL{{ end }} --graceful=false --wait=false" | bash
    preconditions:
      - which talhelper
